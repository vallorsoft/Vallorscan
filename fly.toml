# Vallorscan – Fly.io konfiguráció
# Fontos: SQLite egyetlen fájl → CSAK 1 gép futhat, perzisztens volume-mal.
# Soha ne skálázd 2+ gépre, mert a SQLite fájl nem osztható meg gépek között.

app = "vallorscan"
primary_region = "ams"   # Amszterdam – közel HU/RO-hoz; igény szerint módosítható

[build]

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  DB_PATH = "/data/vallorscan.sqlite"

# Perzisztens lemez a SQLite adatbázisnak (deploy között megmarad).
[mounts]
  source = "vallorscan_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true          # PWA + Web Share Target HTTPS-t igényel
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1    # mindig fusson 1 gép (valós idejű SSE)

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
